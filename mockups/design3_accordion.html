<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Battle Brothers – Backgrounds</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080808;
    --surface:   #141414;
    --surface-h: #1e1e1e;
    --expanded:  #1a1a1a;
    --border:    #222;
    --amber:     #d4a843;
    --amber-dim: #9a7520;
    --text-pri:  #eeeeee;
    --text-sec:  #aaaaaa;
    --text-name: #ffffff;
    --track:     #252525;
    --bar-low:   #c0392b;
    --bar-mid:   #e6b800;
    --bar-high:  #27ae60;
    --nav-h:     52px;
    --ctrl-h:    88px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-pri);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.3;
    overscroll-behavior: none;
  }

  #app {
    max-width: 430px;
    margin: 0 auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ── TOP CONTROLS ──────────────────────────────────────── */
  #controls {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #search-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px 8px;
  }

  #search-wrap svg {
    flex-shrink: 0;
    color: #555;
  }

  #search {
    flex: 1;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: var(--text-pri);
    font-size: 13px;
    padding: 7px 10px 7px 32px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }

  #search-wrap {
    position: relative;
  }

  #search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: #555;
  }

  #search:focus {
    border-color: var(--amber-dim);
  }

  #search::placeholder { color: #444; }

  #pills-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 12px 10px;
    scrollbar-width: none;
  }
  #pills-wrap::-webkit-scrollbar { display: none; }

  #pills {
    display: flex;
    gap: 6px;
    width: max-content;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid #2c2c2c;
    background: #111;
    color: var(--text-sec);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    transition: background .15s, color .15s, border-color .15s;
    -webkit-tap-highlight-color: transparent;
  }

  .pill:active { background: #1a1a1a; }

  .pill.active {
    background: rgba(212,168,67,.15);
    border-color: var(--amber);
    color: var(--amber);
  }

  .pill .arrow {
    font-size: 9px;
    line-height: 1;
    opacity: .8;
  }

  /* ── RESULT COUNT ──────────────────────────────────────── */
  #result-count {
    font-size: 11px;
    color: #555;
    padding: 0 12px 6px;
    flex-shrink: 0;
  }

  /* ── LIST ──────────────────────────────────────────────── */
  #list-wrap {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    padding-bottom: calc(var(--nav-h) + 4px);
  }

  #list-wrap::-webkit-scrollbar { width: 3px; }
  #list-wrap::-webkit-scrollbar-track { background: transparent; }
  #list-wrap::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  .bg-item {
    border-bottom: 1px solid var(--border);
  }

  /* ── COLLAPSED ROW ─────────────────────────────────────── */
  .bg-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background .15s;
    min-height: 54px;
  }

  .bg-row:active,
  .bg-item.open .bg-row {
    background: var(--surface-h);
  }

  .bg-icon {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    object-fit: contain;
    background: #1c1c1c;
    flex-shrink: 0;
    border: 1px solid #282828;
  }

  .bg-icon-fallback {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    background: #1c1c1c;
    flex-shrink: 0;
    border: 1px solid #282828;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 16px;
  }

  .bg-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .bg-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-name);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* mini sparkline */
  .bg-sparkline {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
  }

  .spark-bar {
    width: 3px;
    border-radius: 1px;
    flex-shrink: 0;
    min-height: 2px;
  }

  .bg-row-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .wage-badge {
    background: rgba(212,168,67,.12);
    border: 1px solid rgba(212,168,67,.3);
    color: var(--amber);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .chevron {
    color: #444;
    font-size: 10px;
    transition: transform .25s ease;
    line-height: 1;
  }

  .bg-item.open .chevron {
    transform: rotate(180deg);
  }

  /* ── EXPANDED PANEL ────────────────────────────────────── */
  .bg-panel {
    overflow: hidden;
    max-height: 0;
    transition: max-height .32s cubic-bezier(.4,0,.2,1);
    background: var(--expanded);
    border-left: 3px solid var(--amber);
  }

  .bg-item.open .bg-panel {
    max-height: 600px;
  }

  .bg-panel-inner {
    padding: 10px 12px 12px 12px;
  }

  /* badges row */
  .panel-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .panel-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 5px;
    border: 1px solid #2e2e2e;
    background: #111;
    color: var(--text-sec);
  }

  .panel-badge span {
    color: var(--text-pri);
    font-weight: 600;
  }

  /* attribute bars */
  .attr-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .attr-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .attr-label {
    width: 30px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-sec);
    text-align: right;
    flex-shrink: 0;
    letter-spacing: .3px;
  }

  .attr-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--track);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .attr-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .35s ease .05s;
  }

  .attr-vals {
    width: 52px;
    font-size: 10px;
    color: var(--text-sec);
    text-align: right;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .attr-avg {
    color: var(--text-pri);
    font-weight: 500;
  }

  .attr-levelup {
    width: 54px;
    font-size: 9px;
    color: #666;
    text-align: right;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .attr-levelup.positive { color: #4a9; }
  .attr-levelup.negative { color: #c66; }

  /* ── BOTTOM NAV ─────────────────────────────────────────── */
  #bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    height: var(--nav-h);
    background: #0e0e0e;
    border-top: 1px solid #1e1e1e;
    display: flex;
    z-index: 30;
  }

  .nav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    color: #555;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .4px;
    text-transform: uppercase;
    transition: color .15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    position: relative;
  }

  .nav-tab.active {
    color: var(--amber);
  }

  .nav-tab.active::after {
    content: '';
    position: absolute;
    top: 0;
    left: 25%;
    width: 50%;
    height: 2px;
    background: var(--amber);
    border-radius: 0 0 2px 2px;
  }

  .nav-tab svg {
    width: 20px;
    height: 20px;
  }

  /* ── EMPTY STATE ───────────────────────────────────────── */
  #empty {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: #444;
    gap: 8px;
    font-size: 13px;
  }

  #empty svg { opacity: .3; }

  /* ── UTILITY ───────────────────────────────────────────── */
  .hidden { display: none !important; }
</style>

  (function() {
    allBgs = EMBEDDED_DATA.backgrounds;
    computeGlobals();
    applyFilter();
  })();

  // ── GLOBALS (min/max across all backgrounds) ──────────────
  function computeGlobals() {
    ATTR_KEYS.forEach(({ key }) => {
      const avgs = allBgs.map(b => b.attributes[key]?.average ?? 0);
      globalMin[key] = Math.min(...avgs);
      globalMax[key] = Math.max(...avgs);
    });
  }

  // ── COLOUR helpers ────────────────────────────────────────
  function pct(key, val) {
    const lo = globalMin[key], hi = globalMax[key];
    if (hi === lo) return 50;
    return Math.max(0, Math.min(100, ((val - lo) / (hi - lo)) * 100));
  }

  function barColor(p) {
    // red (0) → yellow (50) → green (100)
    if (p <= 50) {
      const t = p / 50;
      const r = Math.round(192 + (230 - 192) * t);
      const g = Math.round(57  + (184 - 57)  * t);
      const b = Math.round(43  + (0   - 43)  * t);
      return `rgb(${r},${g},${b})`;
    } else {
      const t = (p - 50) / 50;
      const r = Math.round(230 + (39  - 230) * t);
      const g = Math.round(184 + (174 - 184) * t);
      const b = Math.round(0   + (96  - 0)   * t);
      return `rgb(${r},${g},${b})`;
    }
  }

  // ── SORT ─────────────────────────────────────────────────
  function sortValue(bg, key) {
    if (key === 'name')     return bg.name.toLowerCase();
    if (key === 'baseWage') return bg.baseWage;
    return bg.attributes[key]?.average ?? 0;
  }

  function applySort() {
    filtered.sort((a, b) => {
      const va = sortValue(a, sortKey);
      const vb = sortValue(b, sortKey);
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  // ── FILTER ────────────────────────────────────────────────
  function applyFilter() {
    const q = query.toLowerCase().trim();
    filtered = q
      ? allBgs.filter(b => b.name.toLowerCase().includes(q))
      : [...allBgs];
    applySort();
    render();
  }

  // ── RENDER ────────────────────────────────────────────────
  function render() {
    listEl.innerHTML = '';
    countEl.textContent = `${filtered.length} of ${allBgs.length} backgrounds`;

    if (!filtered.length) {
      emptyEl.style.display = 'flex';
      return;
    }
    emptyEl.style.display = 'none';

    filtered.forEach(bg => {
      listEl.appendChild(buildItem(bg));
    });

    // restore open state after re-render
    if (openId) {
      const el = document.getElementById(`item-${openId}`);
      if (el) el.classList.add('open');
    }
  }

  // ── BUILD ITEM ────────────────────────────────────────────
  function buildItem(bg) {
    const wrap = document.createElement('div');
    wrap.className = 'bg-item';
    wrap.id = `item-${bg.id}`;

    // ── collapsed row
    const row = document.createElement('div');
    row.className = 'bg-row';

    // icon
    const iconSrc = `../assets/${bg.icon}`;
    const img = document.createElement('img');
    img.className = 'bg-icon';
    img.alt = bg.name;
    img.loading = 'lazy';
    img.src = iconSrc;
    img.onerror = function () {
      const fb = document.createElement('div');
      fb.className = 'bg-icon-fallback';
      fb.textContent = '⚔';
      this.replaceWith(fb);
    };
    row.appendChild(img);

    // center info
    const main = document.createElement('div');
    main.className = 'bg-main';

    const nameEl = document.createElement('div');
    nameEl.className = 'bg-name';
    nameEl.textContent = bg.name;
    main.appendChild(nameEl);

    // sparkline
    const spark = document.createElement('div');
    spark.className = 'bg-sparkline';
    ATTR_KEYS.forEach(({ key }) => {
      const avg = bg.attributes[key]?.average ?? 0;
      const p   = pct(key, avg);
      const bar = document.createElement('div');
      bar.className = 'spark-bar';
      const h = Math.max(2, Math.round(p * 0.16)); // max 16px
      bar.style.cssText = `height:${h}px;background:${barColor(p)};`;
      spark.appendChild(bar);
    });
    main.appendChild(spark);
    row.appendChild(main);

    // right side
    const right = document.createElement('div');
    right.className = 'bg-row-right';

    const wage = document.createElement('div');
    wage.className = 'wage-badge';
    wage.textContent = `${bg.baseWage}g`;
    right.appendChild(wage);

    const chev = document.createElement('div');
    chev.className = 'chevron';
    chev.textContent = '▾';
    right.appendChild(chev);

    row.appendChild(right);
    wrap.appendChild(row);

    // ── expanded panel
    const panel = document.createElement('div');
    panel.className = 'bg-panel';

    const inner = document.createElement('div');
    inner.className = 'bg-panel-inner';

    // badges
    const badges = document.createElement('div');
    badges.className = 'panel-badges';
    badges.innerHTML = `
      <div class="panel-badge">Level <span>${bg.startingLevel.min}–${bg.startingLevel.max}</span></div>
      <div class="panel-badge">Wage <span>${bg.baseWage}g</span></div>
    `;
    inner.appendChild(badges);

    // attribute bars
    const attrList = document.createElement('div');
    attrList.className = 'attr-list';

    ATTR_KEYS.forEach(({ key, label }) => {
      const attr = bg.attributes[key];
      if (!attr) return;

      const avg = attr.average;
      const p   = pct(key, avg);
      const color = barColor(p);

      const attrRow = document.createElement('div');
      attrRow.className = 'attr-row';

      // label
      const lbl = document.createElement('div');
      lbl.className = 'attr-label';
      lbl.textContent = label;
      attrRow.appendChild(lbl);

      // bar
      const barWrap = document.createElement('div');
      barWrap.className = 'attr-bar-wrap';
      const fill = document.createElement('div');
      fill.className = 'attr-bar-fill';
      fill.style.cssText = `width:${p}%;background:${color};`;
      barWrap.appendChild(fill);
      attrRow.appendChild(barWrap);

      // values
      const vals = document.createElement('div');
      vals.className = 'attr-vals';
      const rangeMin = attr.range?.min ?? '?';
      const rangeMax = attr.range?.max ?? '?';
      vals.innerHTML = `<span class="attr-avg">${avg}</span> <span style="color:#555;font-size:9px">${rangeMin}–${rangeMax}</span>`;
      attrRow.appendChild(vals);

      // level-up
      const lu = document.createElement('div');
      lu.className = 'attr-levelup';
      const luMin = attr.levelUp?.min;
      const luMax = attr.levelUp?.max;
      if (luMin === null && luMax === null) {
        lu.textContent = '—';
      } else {
        const luMinStr = luMin !== null ? luMin : '?';
        const luMaxStr = luMax !== null ? luMax : '?';
        const val = luMin ?? luMax;
        lu.textContent = `+${luMinStr}/+${luMaxStr}`;
        if (val !== null && val < 0) {
          lu.textContent = `${luMinStr}/${luMaxStr}`;
          lu.classList.add('negative');
        } else if (val !== null && val > 0) {
          lu.classList.add('positive');
        }
      }
      attrRow.appendChild(lu);

      attrList.appendChild(attrRow);
    });

    inner.appendChild(attrList);
    panel.appendChild(inner);
    wrap.appendChild(panel);

    // ── toggle
    row.addEventListener('click', () => toggleItem(bg.id, wrap));

    return wrap;
  }

  function toggleItem(id, wrap) {
    const isOpen = wrap.classList.contains('open');

    // close previously open
    if (openId && openId !== id) {
      const prev = document.getElementById(`item-${openId}`);
      if (prev) prev.classList.remove('open');
    }

    if (isOpen) {
      wrap.classList.remove('open');
      openId = null;
    } else {
      wrap.classList.add('open');
      openId = id;
      // scroll into view gently
      setTimeout(() => {
        wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }
  }

  // ── PILL SORT ─────────────────────────────────────────────
  pillsEl.addEventListener('click', e => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    const key = pill.dataset.key;

    if (sortKey === key) {
      sortAsc = !sortAsc;
    } else {
      sortKey = key;
      sortAsc = key === 'name'; // default asc for name, desc for stats
    }

    // update pills UI
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.remove('active');
      const arrow = p.querySelector('.arrow');
      if (arrow) arrow.remove();
    });
    pill.classList.add('active');
    const arrowSpan = document.createElement('span');
    arrowSpan.className = 'arrow';
    arrowSpan.textContent = sortAsc ? '▲' : '▼';
    pill.appendChild(arrowSpan);

    applySort();
    render();
  });

  // ── SEARCH ────────────────────────────────────────────────
  let searchTimer;
  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      query = searchEl.value;
      openId = null;
      applyFilter();
    }, 180);
  });

  // ── NAV TABS (visual only) ────────────────────────────────
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });

})();
</script>
</body>
</html>
