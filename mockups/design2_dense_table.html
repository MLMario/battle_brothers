<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Backgrounds – Battle Brothers Companion</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page:       #0a0a0a;
    --bg-row-even:   #111111;
    --bg-row-odd:    #1a1a1a;
    --bg-header:     #222222;
    --bg-sticky-col: #111111;
    --bg-popup:      #1e1e1e;
    --gold:          #d4a843;
    --gold-dim:      #9a7830;
    --text-name:     #ffffff;
    --text-val:      #cccccc;
    --text-muted:    #666666;
    --border:        #2a2a2a;
    --shadow-sep:    rgba(0,0,0,0.8);
    --green-high:    #3d8c40;
    --green-mid:     #2a6b2d;
    --red-low:       #8c2a2a;
    --red-mid:       #6b1e1e;
    --neutral:       #333;
  }

  html, body {
    height: 100%;
    background: var(--bg-page);
    color: var(--text-val);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    overscroll-behavior: none;
  }

  #app {
    max-width: 430px;
    width: 100%;
    height: 100dvh;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: var(--bg-page);
    position: relative;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  #top-bar {
    flex-shrink: 0;
    background: #161616;
    border-bottom: 1px solid var(--border);
    padding: 10px 12px 8px;
  }

  #top-bar h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  #search-wrap {
    position: relative;
  }

  #search-wrap svg {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 6px;
    color: var(--text-name);
    font-size: 13px;
    padding: 7px 10px 7px 30px;
    outline: none;
    -webkit-appearance: none;
  }
  #search::placeholder { color: var(--text-muted); }
  #search:focus { border-color: var(--gold-dim); }

  /* ── TABLE CONTAINER ── */
  #table-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* The scroll wrapper sits inside the container */
  #scroll-outer {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    -webkit-overflow-scrolling: touch;
  }

  /* Inner layout: sticky left col + scrollable right area */
  #table-layout {
    display: flex;
    min-height: 100%;
  }

  /* ── LEFT (STICKY) COLUMN ── */
  #left-col {
    flex-shrink: 0;
    width: 140px;
    position: sticky;
    left: 0;
    z-index: 10;
    background: var(--bg-page);
  }

  /* Separator shadow on the right edge of sticky col */
  #left-col::after {
    content: '';
    position: absolute;
    top: 0; right: -12px; bottom: 0;
    width: 12px;
    background: linear-gradient(to right, rgba(0,0,0,0.55), transparent);
    pointer-events: none;
  }

  /* ── RIGHT (SCROLLABLE) AREA ── */
  #right-scroll-area {
    flex: 1;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  #right-inner {
    min-width: max-content;
  }

  /* ── HEADER ROW ── */
  .header-row {
    display: flex;
    align-items: center;
    background: var(--bg-header);
    height: 36px;
    position: sticky;
    top: 0;
    z-index: 20;
    border-bottom: 1px solid #333;
  }

  #left-col .header-row {
    z-index: 30;
  }

  .header-left {
    display: flex;
    align-items: center;
    height: 36px;
    padding: 0 6px;
    width: 140px;
    background: var(--bg-header);
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    user-select: none;
    cursor: pointer;
    gap: 4px;
    border-bottom: 1px solid #333;
  }

  .header-left:hover { background: #2a2a2a; }

  .col-header {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 36px;
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    user-select: none;
    gap: 2px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    transition: background 0.1s;
  }
  .col-header:hover { background: #2a2a2a; }
  .col-header.active { color: #fff; background: #282010; }

  .sort-arrow {
    font-size: 9px;
    opacity: 0.7;
    line-height: 1;
  }

  /* ── DATA ROWS ── */
  .data-row-left,
  .data-row-right {
    display: flex;
    align-items: center;
    height: 40px;
    transition: background 0.1s;
  }

  .row-even .data-row-left,
  .row-even .data-row-right { background: var(--bg-row-even); }

  .row-odd .data-row-left,
  .row-odd .data-row-right  { background: var(--bg-row-odd); }

  .data-row-left:active,
  .data-row-right:active,
  .row-wrap.active .data-row-left,
  .row-wrap.active .data-row-right {
    background: #252010 !important;
  }

  .data-row-left {
    width: 140px;
    padding: 0 6px;
    gap: 5px;
    cursor: pointer;
    border-bottom: 1px solid #1c1c1c;
  }

  .data-row-right {
    cursor: pointer;
    border-bottom: 1px solid #1c1c1c;
  }

  .row-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    object-fit: contain;
    image-rendering: pixelated;
    border-radius: 3px;
    background: #111;
  }

  .row-icon-fallback {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    border-radius: 3px;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--gold-dim);
    font-weight: 700;
  }

  .row-name {
    color: var(--text-name);
    font-size: 11px;
    font-weight: 500;
    line-height: 1.2;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    flex: 1;
  }

  .cell {
    width: 46px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'SF Mono', 'Fira Mono', 'Consolas', 'Monaco', monospace;
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    position: relative;
    color: var(--text-val);
    transition: filter 0.1s;
  }

  /* Color tiers for cells */
  .cell.tier-5 { color: #4fc552; font-weight: 700; }
  .cell.tier-4 { color: #3aa33d; }
  .cell.tier-3 { color: #cccccc; }
  .cell.tier-2 { color: #c05050; }
  .cell.tier-1 { color: #e03030; font-weight: 700; }

  /* ── POPUP ── */
  #popup-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.35);
  }
  #popup-overlay.visible { display: block; }

  #popup {
    position: absolute;
    left: 8px;
    right: 8px;
    background: var(--bg-popup);
    border: 1px solid #383828;
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(212,168,67,0.12);
    max-height: 80vh;
    overflow-y: auto;
  }

  #popup-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid #333;
  }

  #popup-icon {
    width: 60px;
    height: 60px;
    object-fit: contain;
    image-rendering: pixelated;
    border-radius: 6px;
    background: #111;
    flex-shrink: 0;
  }

  #popup-icon-fallback {
    width: 60px;
    height: 60px;
    border-radius: 6px;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--gold-dim);
    font-weight: 700;
    flex-shrink: 0;
  }

  #popup-title-area { flex: 1; min-width: 0; }

  #popup-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-name);
    margin-bottom: 4px;
  }

  .popup-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .popup-badge {
    font-size: 11px;
    color: var(--gold);
    background: rgba(212,168,67,0.1);
    border: 1px solid rgba(212,168,67,0.25);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'SF Mono', monospace;
  }

  #popup-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #333;
    border: none;
    color: #aaa;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  #popup-close:hover { background: #444; color: #fff; }

  .attr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .attr-card {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 7px;
    padding: 9px 10px;
  }

  .attr-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .attr-rows { display: flex; flex-direction: column; gap: 3px; }

  .attr-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
  }

  .attr-row-key {
    color: var(--text-muted);
    font-size: 10px;
  }

  .attr-row-val {
    font-family: 'SF Mono', 'Consolas', monospace;
    font-size: 12px;
    color: var(--text-val);
    font-weight: 500;
  }

  .attr-row-val.null-val { color: #444; }

  .attr-avg {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-name);
    margin-bottom: 4px;
    font-family: 'SF Mono', monospace;
  }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    flex-shrink: 0;
    height: 56px;
    background: #161616;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
  }

  .nav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    color: var(--text-muted);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    font-weight: 600;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-tab svg { opacity: 0.5; transition: opacity 0.15s; }

  .nav-tab.active {
    color: var(--gold);
  }
  .nav-tab.active svg { opacity: 1; }

  .nav-tab:not(.active):hover { color: #aaa; }

  /* ── EMPTY STATE ── */
  #empty-state {
    display: none;
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  #empty-state.visible { display: block; }

  /* ── LOADING ── */
  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-muted);
    font-size: 13px;
    gap: 8px;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid #333;
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCROLLBAR STYLING ── */
  #right-scroll-area::-webkit-scrollbar { height: 4px; }
  #right-scroll-area::-webkit-scrollbar-track { background: #111; }
  #right-scroll-area::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  #scroll-outer::-webkit-scrollbar { width: 3px; }
  #scroll-outer::-webkit-scrollbar-track { background: transparent; }
  #scroll-outer::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* row highlight for active popup */
  .row-wrap.popup-open .data-row-left,
  .row-wrap.popup-open .data-row-right {
    background: #1e1908 !important;
  }
</style>

    buildColHeaders();
    applyFilterAndSort();
    $loading.style.display = 'none';
    $tableLayout.style.display = 'flex';
  })();

  // ── Compute min/max per attribute across ALL backgrounds (for color tiers)
  function computeColRanges() {
    COLS.forEach(col => {
      let mn = Infinity, mx = -Infinity;
      allBackgrounds.forEach(bg => {
        const avg = bg.attributes[col.key]?.average;
        if (avg != null) { mn = Math.min(mn, avg); mx = Math.max(mx, avg); }
      });
      colRanges[col.key] = { min: mn, max: mx };
    });
  }

  // ── Map a value in [min,max] to a tier 1-5
  function getTier(val, key) {
    const r = colRanges[key];
    if (r == null || r.min === r.max) return 3;
    const t = (val - r.min) / (r.max - r.min); // 0..1
    if (t >= 0.8) return 5;
    if (t >= 0.6) return 4;
    if (t >= 0.4) return 3;
    if (t >= 0.2) return 2;
    return 1;
  }

  // ── Build column headers
  function buildColHeaders() {
    $colHeaders.innerHTML = '';
    COLS.forEach(col => {
      const el = document.createElement('div');
      el.className = 'col-header';
      el.dataset.key = col.key;
      el.innerHTML = col.abbr + ' <span class="sort-arrow" id="arrow-' + col.key + '"></span>';
      el.addEventListener('click', () => handleColSort(col.key, el));
      $colHeaders.appendChild(el);
    });
    updateSortIndicators();
  }

  function handleColSort(key, _el) {
    if (sortKey === key) {
      sortDir = -sortDir;
    } else {
      sortKey = key;
      sortDir = -1; // default: highest first for attributes
    }
    applyFilterAndSort();
    updateSortIndicators();
  }

  function handleNameSort() {
    if (sortKey === 'name') {
      sortDir = -sortDir;
    } else {
      sortKey = 'name';
      sortDir = 1;
    }
    applyFilterAndSort();
    updateSortIndicators();
  }

  function updateSortIndicators() {

      if (arrowEl) arrowEl.textContent = arrow;
      const headerEl = document.querySelector('.col-header[data-key="' + sortKey + '"]');
      if (headerEl) headerEl.classList.add('active');
    }
  }

  // ── Filter + sort
  function applyFilterAndSort() {
    const q = $search.value.trim().toLowerCase();
    filtered = allBackgrounds.filter(bg =>
      !q || bg.name.toLowerCase().includes(q)
    );

    filtered.sort((a, b) => {
      if (sortKey === 'name') {
        return sortDir * a.name.localeCompare(b.name);
      }
      const av = a.attributes[sortKey]?.average ?? -Infinity;
      const bv = b.attributes[sortKey]?.average ?? -Infinity;
      return sortDir * (av - bv);
    });

    render();
  }

  // ── Render rows
  function render() {
    $leftBody.innerHTML  = '';
    $rightBody.innerHTML = '';

    if (filtered.length === 0) {
      $emptyState.classList.add('visible');
      return;
    }
    $emptyState.classList.remove('visible');

    filtered.forEach((bg, i) => {
      const isEven  = i % 2 === 0;
      const rowClass = isEven ? 'row-even' : 'row-odd';

      // ── Left cell
      const leftRow = document.createElement('div');
      leftRow.className = 'data-row-left ' + rowClass;
      leftRow.dataset.id = bg.id;

      const iconSrc = '../assets/' + bg.icon;
      const initials = bg.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      leftRow.innerHTML =
        '<img class="row-icon" src="' + iconSrc + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="row-icon-fallback" style="display:none">' + initials + '</div>' +
        '<span class="row-name">' + escHtml(bg.name) + '</span>';
      leftRow.addEventListener('click', () => openPopup(bg, leftRow));
      $leftBody.appendChild(leftRow);

      // ── Right cells
      const rightRow = document.createElement('div');
      rightRow.className = 'data-row-right ' + rowClass;
      rightRow.dataset.id = bg.id;

      COLS.forEach(col => {
        const attrObj = bg.attributes[col.key];
        const avg     = attrObj?.average;
        const cell    = document.createElement('div');
        cell.className = 'cell';
        if (avg != null) {
          cell.textContent = formatNum(avg);
          const tier = getTier(avg, col.key);
          cell.classList.add('tier-' + tier);
        } else {
          cell.textContent = '—';
          cell.style.color = '#444';
        }
        rightRow.appendChild(cell);
      });
      rightRow.addEventListener('click', () => openPopup(bg, leftRow));
      $rightBody.appendChild(rightRow);
    });
  }

  function formatNum(v) {
    return Number.isInteger(v) ? String(v) : v.toFixed(1);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Open popup
  function openPopup(bg, leftRowEl) {
    // Close any existing
    if (openRowId) {
      document.querySelectorAll('[data-id="' + openRowId + '"]').forEach(el => el.classList.remove('popup-open'));
    }

    openRowId = bg.id;
    document.querySelectorAll('[data-id="' + bg.id + '"]').forEach(el => el.classList.add('popup-open'));

    // Build popup content
    const iconSrc  = '../assets/' + bg.icon;
    const initials = bg.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

    $popupIconW.innerHTML =
      '<img id="popup-icon" src="' + iconSrc + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
      '<div id="popup-icon-fallback" style="display:none">' + initials + '</div>';

    $popupName.textContent = bg.name;

    $popupMeta.innerHTML =
      '<span class="popup-badge">Wage: ' + bg.baseWage + 'g</span>' +
      '<span class="popup-badge">Lvl: ' + bg.startingLevel.min + (bg.startingLevel.max !== bg.startingLevel.min ? '–' + bg.startingLevel.max : '') + '</span>';

    $popupAttrs.innerHTML = '';
    COLS.forEach(col => {
      const attrObj = bg.attributes[col.key];
      if (!attrObj) return;

      const card = document.createElement('div');
      card.className = 'attr-card';

      const avg = attrObj.average;
      const rMin = attrObj.range?.min;
      const rMax = attrObj.range?.max;
      const lMin = attrObj.levelUp?.min;
      const lMax = attrObj.levelUp?.max;

      const luStr = (lMin == null && lMax == null)
        ? '<span class="attr-row-val null-val">—</span>'
        : '<span class="attr-row-val">' + escHtml(formatLevelUp(lMin, lMax)) + '</span>';

      card.innerHTML =
        '<div class="attr-label">' + escHtml(ATTR_LABELS[col.key]) + '</div>' +
        '<div class="attr-avg">' + (avg != null ? formatNum(avg) : '—') + '</div>' +
        '<div class="attr-rows">' +
          '<div class="attr-row">' +
            '<span class="attr-row-key">Range</span>' +
            '<span class="attr-row-val">' + (rMin != null ? rMin + '–' + rMax : '—') + '</span>' +
          '</div>' +
          '<div class="attr-row">' +
            '<span class="attr-row-key">Level Up</span>' +
            luStr +
          '</div>' +
        '</div>';

      $popupAttrs.appendChild(card);
    });

    // Position popup: try below the tapped row, but keep within viewport
    positionPopup(leftRowEl);

    $overlay.classList.add('visible');
    $overlay.style.display = 'block';
  }

  function formatLevelUp(mn, mx) {
    if (mn == null && mx == null) return '—';
    if (mn === mx || mn == null) return String(mx ?? mn);
    return mn + ' / ' + mx;
  }

  function positionPopup(refEl) {
    // Place popup roughly centered vertically on screen within table-container
    const container = document.getElementById('table-container');
    const cRect  = container.getBoundingClientRect();
    const rRect  = refEl ? refEl.getBoundingClientRect() : null;

    // Default: vertically center inside table container
    const popupH = Math.min(window.innerHeight * 0.75, 480);
    $popup.style.maxHeight = popupH + 'px';

    if (rRect) {
      // Place below row if room, else above
      const rowBottom = rRect.bottom - cRect.top;
      const roomBelow = cRect.height - rowBottom;
      if (roomBelow > popupH * 0.5) {
        $popup.style.top  = (rowBottom + 6) + 'px';
        $popup.style.bottom = 'auto';
      } else {
        const rowTop = rRect.top - cRect.top;
        $popup.style.bottom = (cRect.height - rowTop + 6) + 'px';
        $popup.style.top    = 'auto';
      }
    } else {
      $popup.style.top  = '50%';
      $popup.style.bottom = 'auto';
      $popup.style.transform = 'translateY(-50%)';
    }
  }

  function closePopup() {
    if (openRowId) {
      document.querySelectorAll('[data-id="' + openRowId + '"]').forEach(el => el.classList.remove('popup-open'));
      openRowId = null;
    }
    $overlay.classList.remove('visible');
    $overlay.style.display = 'none';
    $popup.style.transform = '';
  }

  $popupClose.addEventListener('click', closePopup);
  $overlay.addEventListener('click', e => { if (e.target === $overlay) closePopup(); });

  // ── Search
  $search.addEventListener('input', () => applyFilterAndSort());

  // ── Name sort
  $sortName.addEventListener('click', handleNameSort);

  // ── Sync vertical scroll between left and right bodies
  // Both are in the same #scroll-outer so they scroll together naturally.
  // Only horizontal scroll is separate in #right-scroll-area.

  // Initial sort indicator
  $arrowName.textContent = '▲';
  $sortName.style.color = '#fff';

})();
</script>
</body>
</html>
